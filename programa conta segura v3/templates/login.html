<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Conta Segura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width: 400px;">
    <h2 class="text-center mb-4">Conta Segura</h2>

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="nome" placeholder="Usuário" required class="form-control">
        </div>

        <div class="mb-3">
            <input type="password" name="senha" placeholder="Senha" required class="form-control">
        </div>

        <button class="btn btn-primary w-100">Entrar</button>
    </form>

</div>

</body>
</html>
