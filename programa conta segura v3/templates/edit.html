
<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
<h2>Editar Lançamento</h2>

<form method="POST">
<input type="text" name="descricao" value="{{ dado[1] }}" required>
<input type="number" step="0.01" name="valor" value="{{ dado[2] }}" required>

<select name="tipo">
  <option value="receita" {% if dado[3]=='receita' %}selected{% endif %}>Receita</option>
  <option value="despesa" {% if dado[3]=='despesa' %}selected{% endif %}>Despesa</option>
</select>

<button class="btn btn-success">Salvar</button>
</form>

</div>

</body>
</html>
